# jCasbin RBAC 模型(六类权限点授权,v0.4 §7)。sub=用户/角色, obj=权限点, act=动作。
# g 支持角色继承(用户→角色)。生产策略切 PG casbin_rule(此处 dev 用文件 policy.csv)。
[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act
