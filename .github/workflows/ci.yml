name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build · spotless · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # verify 阶段绑定 spotless:check + 单测(见 pom)。用仓内 mvnw 自举,只需 JDK。
      - name: Build, format-check & test
        run: ./mvnw -B -ntp verify
