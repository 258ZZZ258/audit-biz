spring:
  config:
    activate:
      on-profile: idaptest

datasource:
  idap:
    dbType: mysql
    type: com.zaxxer.hikari.HikariDataSource
    # 内网通过 IDAP_DB_* 切换 MySQL；外网默认回退到 application.yml 的 H2。
    # 不固定 driver-class-name，让 Hikari 按 JDBC URL 选择 H2/MySQL/PostgreSQL 驱动。
    jdbc-url: ${IDAP_DB_URL:${DB_URL:jdbc:h2:mem:auditai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}}
    username: ${IDAP_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
    password: ${IDAP_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    mapperlocation: classpath*:com/orientsec/idap/core/mapper/**/*.xml
    autoCommit: false
    connectionTimeout: ${IDAP_DB_CONNECTION_TIMEOUT:5000}
    idleTimeout: ${IDAP_DB_IDLE_TIMEOUT:300000}
    maxLifetime: ${IDAP_DB_MAX_LIFETIME:1200000}
    minimumIdle: ${IDAP_DB_MIN_IDLE:5}
    maximumPoolSize: ${IDAP_DB_MAX_POOL_SIZE:15}
    poolName: pool-idap
    validationTimeout: ${IDAP_DB_VALIDATION_TIMEOUT:10000}
