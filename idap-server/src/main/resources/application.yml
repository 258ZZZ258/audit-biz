spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:idaptest,share,authdev,jobtest}
  application:
    name: ${APP_NAME:idap-server}
  # Profile 由部署环境通过 SPRING_PROFILES_ACTIVE 指定；不在仓库中默认连接内网服务。
  jackson:
    # 对前端/边界契约统一 snake_case(SPEC-FRONTEND-REGQUERY / boundary.v1.yaml 命名决策)。
    property-naming-strategy: SNAKE_CASE
  datasource:
    # 默认嵌入式 H2(dev/CI/无 PG 时可启动,无凭据入库,CONFIG-SECRET-DEFAULTS-001)。
    # 生产经 env 覆盖为真 PG:DB_URL + SPRING_DATASOURCE_USERNAME/PASSWORD(连接串/密钥绝不入库)。
    url: ${DB_URL:jdbc:h2:mem:auditai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
  security:
    oauth2:
      resourceserver:
        jwt:
          # 甲方 SSO 的 JWKS(标准协议,§7/§12 最终协议待甲方)。dev/CI 用占位——
          # NimbusJwtDecoder 懒取 JWKS,不在启动时联网,故占位不阻启动;生产走 env SSO_JWK_SET_URI。
          jwk-set-uri: ${SSO_JWK_SET_URI:https://sso.placeholder.invalid/.well-known/jwks.json}

datasource:
  idap:
    jdbc-url: ${DB_URL:jdbc:h2:mem:auditai;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    mapperlocation: classpath*:com/orientsec/idap/core/mapper/**/*.xml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

dubbo:
  application:
    name: ${DUBBO_APPLICATION_NAME:${spring.application.name}}
  registry:
    # 外网无注册中心时允许独立启动；内网由 application-auth*.yml 覆盖为 ZK 地址。
    address: ${DUBBO_REGISTRY_ADDRESS:N/A}
  consumer:
    check: false

audit:
  ai:
    # audit-biz → audit-ai 边界二:单向、无身份、共享密钥。只调 /v1/query。
    base-url: ${AUDIT_AI_BASE_URL:http://127.0.0.1:8771}
    internal-token: ${AUDIT_AI_INTERNAL_TOKEN:}
    stub:
      enabled: ${AUDIT_AI_STUB_ENABLED:false}

logging:
  level:
    # 防授权明细泄露(AUTHZ-LOG-001):jCasbin 默认 INFO 打印 Policy/Role/enforce 决策。
    # 与 Authorizer 里的 Util.enableLog=false 双保险(挡任何绕过 Util 直走 slf4j 的路径)。
    org.casbin.jcasbin: warn
