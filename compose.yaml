name: audit-biz

# audit-biz 本地后端栈(现阶段仅 PG)。独立端口 5544,不撞 audit-ai 栈(5432/5433)。
# 生产/信创另行部署;本 compose 只为本地 dev/demo。连接串/密钥经 env 注入应用(见 README「本地后端栈」)。
services:
  pg:
    image: postgres:16
    environment:
      POSTGRES_USER: audit_biz
      # 密码经 env(.env,不入库);无默认,强制显式设置——不留众所周知的明文口令。
      POSTGRES_PASSWORD: ${AUDIT_BIZ_PG_PASSWORD:?请先 cp .env.example .env 并设置}
      POSTGRES_DB: audit_biz
    ports:
      # 仅绑回环:不在局域网暴露 DB(SEC-LOCAL-PG-DEFAULT-CREDS-001)。
      - "127.0.0.1:5544:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # 首次初始化空库时按序执行(schema → seed)。
      - ./idap-ddl/src/main/resources/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit_biz -d audit_biz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
