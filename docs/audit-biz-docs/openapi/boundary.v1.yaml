openapi: 3.0.3
info:
  title: audit-biz ↔ audit-ai 边界契约（边界二·单向无身份）
  version: 1.0.0-draft
  description: >
    audit-biz（Java，唯一对外入口）→ audit-ai（Python，无状态推理/解析端点）的内网服务间契约。
    单向、无身份、共享密钥 + 网络隔离（v0.4 §6.3/§7 边界二）。Java 把预计算好的权限过滤值
    （perm_tags / corpus_types / project_id / owner）当普通字段下传；检索前置过滤红线满足（算在 Java、用在 Python）。
    本版（v1）只定**制度查询同步热路径** /v1/query（SSE），其余端点占位（签名 + 职责，DTO 待各自 SPEC）。
    规范单一源 = 本 YAML；散文语义/约束见 ../SPEC-BOUNDARY.md。
servers:
  - url: http://audit-ai.internal:8000
    description: 内网，仅 audit-biz 可达（网络隔离）

security:
  - InternalToken: []

paths:
  /v1/query:
    post:
      operationId: regulationQuery
      summary: 制度查询（单流式端点，SSE）
      description: >
        audit-ai 内部完成八路路由 / 检索 / 覆盖感知拒答 / 生成，流式回 answer 增量 + 轻量引用标识
        （chunk_id/clause_id + confidence + ai_label）+ route_type。**引用四级定位由 audit-biz 回查 PG 装配**
        （§8.2 Java 收口），audit-ai 在线热路径不依赖 PG。
      security:
        - InternalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryRequest' }
      responses:
        '200':
          description: >
            SSE 流（text/event-stream）。事件序：先 1 个 `meta`，多个 `delta`（答案增量）与 `citation`
            交错，末 1 个 `done`；任意时刻可能 1 个 `error` 后关闭。每个事件 data 为下列 JSON 之一。
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/SseEventEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/ServerError' }

  # ───────────────── 占位端点（v1 不展开 DTO，签名 + 职责锁定，各自 SPEC 细化）─────────────────
  /v1/compare:
    post:
      operationId: compareSubmit
      summary: '[占位] 文档比对（异步：义务抽取 / 覆盖判定）'
      description: '占位。异步长任务（30–120min），提交返回任务引用，进度由 biz 侧 async_tasks 收口轮询（§8.4）。DTO 待 SPEC-COMPARE。'
      responses:
        '501': { description: Not Implemented（占位） }
  /v1/ocr:
    post:
      operationId: ocrInvoice
      summary: '[占位] 费用发票 OCR（图像→文本）'
      description: '占位。Java 发起，Python 返回文本 + 违规原因说明计算。DTO 待 SPEC-OCR。'
      responses:
        '501': { description: Not Implemented（占位） }
  /v1/ingest-batch:
    post:
      operationId: ingestBatch
      summary: '[占位] 离线摄取管线 S0–S5（语料生产者）'
      description: '占位。离线写 PG 语料表 + Milvus，audit-ai 作为语料生产者的固有职责。DTO 待 SPEC-INGEST。'
      responses:
        '501': { description: Not Implemented（占位） }

components:
  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: >
        静态共享密钥（两侧配置注入：env AUDIT_AI_INTERNAL_TOKEN，绝不入库）+ 网络隔离。
        缺失/不符 → 401 B104。无身份语义：本头**不**承载用户身份,仅证明调用方是 audit-biz。

  schemas:
    QueryRequest:
      type: object
      required: [query, filters, request_id]
      properties:
        query: { type: string, minLength: 1, description: 用户问题原文 }
        request_id:
          type: string
          description: 调用方生成的关联 ID（建议 ULID），贯穿 Langfuse 观测；非幂等键。
        filters:
          $ref: '#/components/schemas/Filters'
        options:
          $ref: '#/components/schemas/QueryOptions'
    Filters:
      type: object
      description: Java 侧 jCasbin 预计算的前置过滤值；Python 直接据此构造 Milvus filter。
      required: [perm_tags, corpus_types]
      properties:
        perm_tags:
          type: array
          items: { type: string }
          description: 密级/职级标签清单（前置过滤位）。可为空数组（无额外限制），但字段必填。
        corpus_types:
          type: array
          items:
            type: string
            enum: [internal, external, qa, case, audit_project]
          description: 检索的语料分区（Milvus partition key）。
        project_id:
          type: string
          nullable: true
          description: 项目资料联合检索时的项目隔离位；制度语料查询为 null。
        owner:
          type: string
          nullable: true
          description: >
            owner 行级 ABAC 过滤位，**仅当 corpus_types 含 audit_project 时生效**；
            制度语料检索不传/忽略（§7.x，制度无个人归属语义）。
    QueryOptions:
      type: object
      properties:
        top_k: { type: integer, minimum: 1, description: 召回条数，缺省由 audit-ai 配置决定 }
        include_superseded:
          type: boolean
          default: false
          description: 是否纳入 superseded 版本（默认只检索 effective）。

    SseEventEnvelope:
      description: >
        说明性 schema：SSE 每条消息 `event:` 为 meta|delta|citation|done|error，`data:` 为对应 JSON。
        OpenAPI 不原生建模 SSE，故此处以 oneOf 列出各 data 负载供两侧 codegen 引用。
      oneOf:
        - $ref: '#/components/schemas/QueryMetaEvent'
        - $ref: '#/components/schemas/QueryDeltaEvent'
        - $ref: '#/components/schemas/QueryCitationEvent'
        - $ref: '#/components/schemas/QueryDoneEvent'
        - $ref: '#/components/schemas/QueryErrorEvent'
    QueryMetaEvent:
      type: object
      required: [request_id, route_type]
      properties:
        request_id: { type: string }
        route_type:
          type: string
          description: >
            八路路由结果（audit-ai 查询智能体）。已知含 factual / judgmental（判定型→biz 渲染"AI 辅助判断,人工复核"框）；
            完整枚举待 RAG 设计路由章节确认（见 SPEC Open Questions）。
        coverage:
          type: object
          nullable: true
          description: 覆盖感知信息（可触发拒答）；结构待定，本版可空。
    QueryDeltaEvent:
      type: object
      required: [text]
      properties:
        text: { type: string, description: 答案增量文本片段 }
        block_seq: { type: integer, description: '所属 answer_block 序号（biz 据此拼 answer_blocks[]）' }
    QueryCitationEvent:
      type: object
      required: [chunk_id]
      description: 轻量引用标识；biz 回查 PG 装配完整 citation(clause_id→doc→page→version→status)。
      properties:
        chunk_id: { type: string }
        clause_id: { type: string, nullable: true }
        confidence: { type: number, format: float }
        ai_label: { type: string, nullable: true, description: AI 标注来源/类型标识 }
        block_seq: { type: integer, description: 关联的 answer_block 序号 }
    QueryDoneEvent:
      type: object
      required: [finish_reason]
      properties:
        finish_reason:
          type: string
          enum: [stop, refused, length, error]
          description: refused = 覆盖感知拒答（非错误）。
        token_usage:
          type: object
          nullable: true
          properties:
            prompt: { type: integer }
            completion: { type: integer }
    QueryErrorEvent:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: 见错误码体系（E1xx–E8xx / B1xx–B4xx）}
        message: { type: string }

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string, nullable: true }

  responses:
    BadRequest:
      description: 请求格式错误
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    Unauthorized:
      description: 内部令牌缺失/无效（B104）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    ValidationError:
      description: 入参语义校验失败（如 filters 缺必填位）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    ServerError:
      description: audit-ai 内部错误（检索/嵌入/生成）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
