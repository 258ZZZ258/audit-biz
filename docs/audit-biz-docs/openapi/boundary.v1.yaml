openapi: 3.0.3
info:
  title: audit-biz ↔ audit-ai 边界契约（边界二·单向无身份）
  version: 1.2.0
  description: >
    audit-biz（Java，唯一对外入口）→ audit-ai（Python，无状态推理/解析端点）的内网服务间契约。
    单向、无身份、共享密钥 + 网络隔离（v0.4 §6.3/§7 边界二）。Java 把预计算好的权限过滤值
    （perm_tags / corpus_types / project_id / owner）当普通字段下传；检索前置过滤红线满足（算在 Java、用在 Python）。
    v1.1 定**制度查询热路径** /v1/query（SSE）；**v1.2 增定** /v1/documents:process（对话上传文档·
    无状态解析为结构化中间产物）；/v1/compare · /v1/ocr · /v1/ingest-batch 仍占位（签名+职责，DTO 待各自 SPEC）。
    规范单一源 = 本 YAML；散文语义/约束见 ../SPEC-BOUNDARY.md。
servers:
  - url: http://audit-ai.internal:8000
    description: 内网，仅 audit-biz 可达（网络隔离）

security:
  - InternalToken: []

paths:
  /v1/query:
    post:
      operationId: regulationQuery
      summary: 制度查询（单流式端点，SSE）
      description: >
        audit-ai 内部完成八路路由 / 检索 / 覆盖感知拒答 / 生成，流式回 answer 增量 + 轻量引用标识
        （chunk_id/clause_id + confidence + ai_label）+ route_type。**引用四级定位由 audit-biz 回查 PG 装配**
        （§8.2 Java 收口），audit-ai 在线热路径不依赖 PG。
      security:
        - InternalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryRequest' }
      responses:
        '200':
          description: >
            SSE 流（text/event-stream）。事件序：先 1 个 `meta`，多个 `delta`（答案增量）与 `citation`
            交错，末 1 个 `done`；任意时刻可能 1 个 `error` 后关闭。每个事件 data 为下列 JSON 之一。
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/SseEventEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/ServerError' }

  /v1/documents:process:
    post:
      operationId: documentProcess
      summary: 对话上传文档 · 无状态解析为结构化中间产物（context-first）
      description: >
        用户在对话框上传文件 → **audit-biz 校验（类型/大小）+ 上传 MinIO** → 调本端点传 object_key。
        audit-ai **无状态**从 MinIO 拉对象 → 解析 → 结构化切块 → 中间产物（结构化 chunks + markdown）落
        MinIO `artifact/{upload_id}.json`，返回元数据。产物**任务无关**，供下游作 LLM 上下文（问答/总结/抽取）。
        **不写权威 PG、不落会话**（红线：会话/导出不落本仓）；向量/制度比对/大文档 RAG 为后续（SPEC-UPLOAD §8）。
        MinIO key 约定：raw = `upload/{upload_id}/{filename}`（Java put）、产物 = `artifact/{upload_id}.json`（audit-ai put）。
        DTO 语义主本见 audit-ai `docs/upload-processing-docs/SPEC-UPLOAD-PROCESSING.md`。
      security:
        - InternalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DocumentProcessRequest' }
      responses:
        '200':
          description: 处理成功，返回产物元数据（产物本体在 MinIO，biz 按 artifact_key 自取）。
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentProcessResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '500': { $ref: '#/components/responses/ServerError' }

  # ───────────────── 占位端点（v1 不展开 DTO，签名 + 职责锁定，各自 SPEC 细化）─────────────────
  /v1/compare:
    post:
      operationId: compareSubmit
      summary: '[占位] 文档比对（异步：义务抽取 / 覆盖判定）'
      description: '占位。异步长任务（30–120min），提交返回任务引用，进度由 biz 侧 async_tasks 收口轮询（§8.4）。DTO 待 SPEC-COMPARE。'
      responses:
        '501': { description: Not Implemented（占位） }
  /v1/ocr:
    post:
      operationId: ocrInvoice
      summary: '[占位] 费用发票 OCR（图像→文本）'
      description: '占位。Java 发起，Python 返回文本 + 违规原因说明计算。DTO 待 SPEC-OCR。'
      responses:
        '501': { description: Not Implemented（占位） }
  /v1/ingest-batch:
    post:
      operationId: ingestBatch
      summary: '[占位] 离线摄取管线 S0–S5（语料生产者）'
      description: '占位。离线写 PG 语料表 + Milvus，audit-ai 作为语料生产者的固有职责。DTO 待 SPEC-INGEST。'
      responses:
        '501': { description: Not Implemented（占位） }

components:
  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: >
        静态共享密钥（两侧配置注入：env AUDIT_AI_INTERNAL_TOKEN，绝不入库）+ 网络隔离。
        缺失/不符 → 401 B104。无身份语义：本头**不**承载用户身份,仅证明调用方是 audit-biz。

  schemas:
    QueryRequest:
      type: object
      required: [query, filters, request_id]
      properties:
        query: { type: string, minLength: 1, description: 用户问题原文 }
        request_id:
          type: string
          description: 调用方生成的关联 ID（建议 ULID），贯穿 Langfuse 观测；非幂等键。
        filters:
          $ref: '#/components/schemas/Filters'
        options:
          $ref: '#/components/schemas/QueryOptions'
    Filters:
      type: object
      description: Java 侧 jCasbin 预计算的前置过滤值；Python 直接据此构造 Milvus filter。
      required: [perm_tags, corpus_types]
      properties:
        perm_tags:
          type: array
          items: { type: string }
          description: 密级/职级标签清单（前置过滤位）。可为空数组（无额外限制），但字段必填。
        corpus_types:
          type: array
          items:
            type: string
            enum: [internal, external, qa, case, audit_project]
          description: 检索的语料分区（Milvus partition key）。
        project_id:
          type: string
          nullable: true
          description: 项目资料联合检索时的项目隔离位；制度语料查询为 null。
        owner:
          type: string
          nullable: true
          description: >
            owner 行级 ABAC 过滤位，**仅当 corpus_types 含 audit_project 时生效**；
            制度语料检索不传/忽略（§7.x，制度无个人归属语义）。
    QueryOptions:
      type: object
      properties:
        top_k: { type: integer, minimum: 1, description: 召回条数，缺省由 audit-ai 配置决定 }
        include_superseded:
          type: boolean
          default: false
          description: 是否纳入 superseded 版本（默认只检索 effective）。

    DocumentProcessRequest:
      type: object
      required: [object_key, upload_id, filename]
      properties:
        object_key:
          type: string
          description: Java 上传到 MinIO 的 raw 对象 key（约定 `upload/{upload_id}/{filename}`）。
        upload_id:
          type: string
          description: 调用方生成的句柄（建议 ULID）；= 产物 key（`artifact/{upload_id}.json`）+ 幂等键。
        filename:
          type: string
          description: 原文件名（audit-ai 据扩展名判类型；白名单 pdf/docx/png/jpg，余 → 415）。
        corpus_hint:
          type: string
          nullable: true
          enum: [internal, external, qa, case]
          description: 切块 profile 提示；缺省按制度条款树。
    DocumentProcessResponse:
      type: object
      required: [upload_id, artifact_key, chunk_count, status]
      properties:
        upload_id: { type: string, description: 回显 upload_id }
        artifact_key:
          type: string
          description: 产物在 MinIO 的 key（`artifact/{upload_id}.json`），biz 自取。
        title: { type: string, nullable: true, description: 解析出的文档标题 }
        page_count: { type: integer, nullable: true, description: 页数（渲染件/原 PDF）}
        chunk_count: { type: integer, description: 结构化切块数 }
        chunk_types:
          type: array
          items: { type: string }
          nullable: true
          description: 出现的 chunk_type 集合（clause / table / …）。
        status: { type: string, enum: [ok], description: 处理状态 }

    RouteType:
      type: string
      description: 八路 route_type（audit-ai query/contract.py::RouteType，§10/§4.2）。
      enum: [evidence, change, case, enumerate, judgmental, statistical, clarify, refuse]
    BlockType:
      type: string
      description: answer_block 块类型（contract.py::BlockType，§10）。
      enum: [text, table, case_card, clarify_question]

    SseEventEnvelope:
      description: >
        说明性 schema：SSE 每条消息 `event:` 为 meta|delta|citation|done|error，`data:` 为对应 JSON。
        OpenAPI 不原生建模 SSE，故以 oneOf 列出各 data 负载供两侧 codegen 引用。字段词汇与 §10 contract.py 对齐。
      oneOf:
        - $ref: '#/components/schemas/QueryMetaEvent'
        - $ref: '#/components/schemas/QueryDeltaEvent'
        - $ref: '#/components/schemas/QueryCitationEvent'
        - $ref: '#/components/schemas/QueryDoneEvent'
        - $ref: '#/components/schemas/QueryErrorEvent'
    QueryMetaEvent:
      type: object
      description: 首事件，承响应级元数据（§10 QueryResult 头部字段）。
      required: [request_id, route_type, ai_label, review_required]
      properties:
        request_id: { type: string, description: 回显请求 request_id（贯穿 Langfuse trace）}
        route_type: { $ref: '#/components/schemas/RouteType' }
        ai_label:
          type: boolean
          description: AI 内容标识，强制存在（§9.3）；恒 true。
        review_required:
          type: boolean
          description: 判定型（route_type=judgmental）=true → biz 渲染"AI 辅助判断,人工复核"框。
        export_enabled:
          type: boolean
          description: 是否允许导出（§10 QueryResult.export_enabled）。
    QueryDeltaEvent:
      type: object
      description: 答案块增量（§10 AnswerBlock；stream=false 的块作单条整块下发）。
      required: [block_seq, text]
      properties:
        block_seq: { type: integer, description: 'answer_block 序号，biz 据此拼 answer_blocks[]' }
        block_type: { $ref: '#/components/schemas/BlockType' }
        text: { type: string, description: 该块的增量（或整块）内容 }
    QueryCitationEvent:
      type: object
      description: >
        轻量引用标识（边界只回此，§8.2 Java 收口）。biz 按 clause_id 回查 PG 装配完整
        citation(clause_id→doc→clause_path→page→version→status)；边界**不含**回查字段。
      required: [clause_id]
      properties:
        clause_id: { type: string, description: 回查主键（§7.3 Citation.clause_id）}
        chunk_id: { type: string, nullable: true, description: 命中块 id（可选，溯源/调试）}
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          description: >
            per-hit 检索融合分（归一 0–1）。**v1.1.0 加法**：biz 装配制度查询四-Tab「匹配度」所需，
            biz 不检索故无法自算（BOUNDARY-RECONCILIATION-001 §3.4/§4）。可空：audit-ai 未提供时 biz 降级不显匹配度，不影响回查。
    QueryDoneEvent:
      type: object
      description: 末事件，承响应级汇总（§10 QueryResult 尾部字段）。
      required: [finish_reason]
      properties:
        finish_reason:
          type: string
          enum: [stop, refused, length, error]
          description: refused = 覆盖感知拒答（route_type=refuse，非错误）。
        confidence: { type: number, format: float, description: 答案整体置信（§10 QueryResult.confidence）}
        exhausted_scope:
          type: array
          items: { type: string }
          description: 覆盖感知拒答时填，已穷尽的检索范围（§8.2 QueryResult.exhausted_scope）。
        token_usage:
          type: object
          nullable: true
          properties:
            prompt: { type: integer }
            completion: { type: integer }
    QueryErrorEvent:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: 见错误码体系（E1xx–E8xx / B1xx–B4xx，含 B104 内部令牌无效、B105 查询热路径内部错误）}
        message: { type: string }

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string, nullable: true }

  responses:
    BadRequest:
      description: 请求格式错误
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    Unauthorized:
      description: 内部令牌缺失/无效（B104）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    ValidationError:
      description: 入参语义校验失败（如 filters 缺必填位）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    UnsupportedMediaType:
      description: 上传类型不在白名单/无解析器（错误码 B2xx 业务校验，具体值待回灌 §8.3）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    ServerError:
      description: audit-ai 内部错误（检索/嵌入/生成/**文档解析**；文档处理失败服务向码 B106 待回灌 §8.3）
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
